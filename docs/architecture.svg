<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #f8f9fa; }
      .zone { fill: #ffffff; stroke: #dee2e6; stroke-width: 1.5; rx: 12; }
      .zone-label { font-size: 13px; font-weight: 600; fill: #6c757d; letter-spacing: 0.5px; }
      .box { rx: 8; stroke-width: 1.5; }
      .box-azure { fill: #e8f4fd; stroke: #0078d4; }
      .box-github { fill: #f0f0f0; stroke: #24292f; }
      .box-dev { fill: #fff3e0; stroke: #e65100; }
      .box-entra { fill: #f3e5f5; stroke: #7b1fa2; }
      .box-kv { fill: #e8f5e9; stroke: #2e7d32; }
      .icon { font-size: 22px; }
      .title { font-size: 13px; font-weight: 600; fill: #212529; }
      .subtitle { font-size: 10px; fill: #6c757d; }
      .arrow { stroke-width: 1.8; fill: none; marker-end: url(#arrowhead); }
      .arrow-blue { stroke: #0078d4; }
      .arrow-green { stroke: #2e7d32; }
      .arrow-orange { stroke: #e65100; }
      .arrow-purple { stroke: #7b1fa2; }
      .arrow-dark { stroke: #495057; }
      .arrow-label { font-size: 9px; fill: #495057; }
      .section-title { font-size: 15px; font-weight: 700; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#495057"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0078d4"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e65100"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7b1fa2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" class="bg"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" class="section-title" fill="#212529">Astro × Azure Static Web Apps — サービスアーキテクチャ</text>

  <!-- ============================================================ -->
  <!-- Developer Zone (left) -->
  <!-- ============================================================ -->
  <rect x="30" y="55" width="240" height="310" class="zone"/>
  <text x="150" y="78" text-anchor="middle" class="zone-label">👨‍💻 開発環境 (WSL / Linux)</text>

  <!-- VS Code -->
  <rect x="55" y="95" width="190" height="60" class="box box-dev"/>
  <text x="150" y="120" text-anchor="middle" class="icon">📝</text>
  <text x="150" y="140" text-anchor="middle" class="title">VS Code + 拡張機能</text>

  <!-- Astro Dev Server -->
  <rect x="55" y="172" width="190" height="60" class="box box-dev"/>
  <text x="150" y="197" text-anchor="middle" class="icon">🚀</text>
  <text x="150" y="217" text-anchor="middle" class="title">Astro Dev Server</text>

  <!-- SWA CLI -->
  <rect x="55" y="249" width="190" height="60" class="box box-dev"/>
  <text x="150" y="274" text-anchor="middle" class="icon">🖥️</text>
  <text x="150" y="294" text-anchor="middle" class="title">SWA CLI (エミュレータ)</text>
  <text x="150" y="306" text-anchor="middle" class="subtitle">認証 / API ローカルテスト</text>

  <!-- Azure CLI -->
  <rect x="55" y="326" width="90" height="30" class="box box-dev" style="fill:#fff8e1"/>
  <text x="100" y="346" text-anchor="middle" style="font-size:10px;font-weight:600;fill:#e65100;">Azure CLI</text>

  <rect x="155" y="326" width="90" height="30" class="box box-dev" style="fill:#fff8e1"/>
  <text x="200" y="346" text-anchor="middle" style="font-size:10px;font-weight:600;fill:#e65100;">GitHub CLI</text>

  <!-- ============================================================ -->
  <!-- GitHub Zone (center-top) -->
  <!-- ============================================================ -->
  <rect x="310" y="55" width="280" height="185" class="zone"/>
  <text x="450" y="78" text-anchor="middle" class="zone-label">🐙 GitHub</text>

  <!-- Repository -->
  <rect x="330" y="95" width="120" height="60" class="box box-github"/>
  <text x="390" y="118" text-anchor="middle" class="icon">📦</text>
  <text x="390" y="140" text-anchor="middle" class="title">Repository</text>

  <!-- GitHub Actions -->
  <rect x="460" y="95" width="120" height="60" class="box box-github"/>
  <text x="520" y="118" text-anchor="middle" class="icon">⚙️</text>
  <text x="520" y="140" text-anchor="middle" class="title">GitHub Actions</text>

  <!-- OIDC -->
  <rect x="330" y="172" width="250" height="55" class="box box-github" style="fill:#e8eaf6; stroke:#3949ab;"/>
  <text x="455" y="195" text-anchor="middle" class="title" style="fill:#3949ab;">🔐 OIDC (Identity Token)</text>
  <text x="455" y="210" text-anchor="middle" class="subtitle">Federated Credential でセキュアにデプロイ</text>

  <!-- ============================================================ -->
  <!-- Azure Zone (right) -->
  <!-- ============================================================ -->
  <rect x="630" y="55" width="440" height="420" class="zone"/>
  <text x="850" y="78" text-anchor="middle" class="zone-label">☁️ Microsoft Azure</text>

  <!-- Resource Group -->
  <rect x="650" y="90" width="400" height="370" rx="8" fill="none" stroke="#0078d4" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="670" y="108" style="font-size:11px;fill:#0078d4;font-weight:600;">📁 rg-astro-swa (リソースグループ)</text>

  <!-- Static Web Apps -->
  <rect x="670" y="118" width="190" height="90" class="box box-azure"/>
  <text x="765" y="148" text-anchor="middle" class="icon">🌐</text>
  <text x="765" y="168" text-anchor="middle" class="title">Azure Static Web Apps</text>
  <text x="765" y="182" text-anchor="middle" class="subtitle">Standard プラン</text>
  <text x="765" y="198" text-anchor="middle" class="subtitle">Astro SSG (dist/)</text>

  <!-- Managed Identity badge -->
  <rect x="874" y="118" width="160" height="90" class="box box-azure" style="fill:#e3f2fd;"/>
  <text x="954" y="145" text-anchor="middle" class="icon">🛡️</text>
  <text x="954" y="165" text-anchor="middle" class="title">Managed Identity</text>
  <text x="954" y="180" text-anchor="middle" class="subtitle">System-assigned</text>
  <text x="954" y="195" text-anchor="middle" class="subtitle">パスワードレスアクセス</text>

  <!-- SWA Built-in Auth -->
  <rect x="670" y="225" width="190" height="70" class="box box-azure"/>
  <text x="765" y="252" text-anchor="middle" class="icon">🔑</text>
  <text x="765" y="270" text-anchor="middle" class="title">組み込み認証</text>
  <text x="765" y="285" text-anchor="middle" class="subtitle">GitHub / Entra ID プロバイダ</text>

  <!-- Key Vault -->
  <rect x="874" y="225" width="160" height="70" class="box box-kv"/>
  <text x="954" y="252" text-anchor="middle" class="icon">🔒</text>
  <text x="954" y="270" text-anchor="middle" class="title">Azure Key Vault</text>
  <text x="954" y="285" text-anchor="middle" class="subtitle">シークレット管理</text>

  <!-- staticwebapp.config.json box -->
  <rect x="670" y="310" width="190" height="55" class="box" style="fill:#fff8e1; stroke:#f57f17;"/>
  <text x="765" y="333" text-anchor="middle" class="title" style="fill:#f57f17;">📄 staticwebapp.config</text>
  <text x="765" y="350" text-anchor="middle" class="subtitle">ルート / 認可 / リダイレクト</text>

  <!-- Application Settings -->
  <rect x="874" y="310" width="160" height="55" class="box" style="fill:#e8f5e9; stroke:#2e7d32;"/>
  <text x="954" y="333" text-anchor="middle" class="title" style="fill:#2e7d32;">⚙️ App Settings</text>
  <text x="954" y="350" text-anchor="middle" class="subtitle">@Microsoft.KeyVault(...)</text>

  <!-- CDN / Custom Domain -->
  <rect x="670" y="380" width="365" height="55" class="box box-azure" style="fill:#e0f7fa; stroke:#00838f;"/>
  <text x="852" y="403" text-anchor="middle" class="icon">🌍</text>
  <text x="852" y="423" text-anchor="middle" class="title" style="fill:#00838f;">カスタムドメイン + 自動 SSL (Let's Encrypt)</text>

  <!-- ============================================================ -->
  <!-- Entra ID Zone (center-bottom) -->
  <!-- ============================================================ -->
  <rect x="310" y="290" width="280" height="105" class="zone"/>
  <text x="450" y="313" text-anchor="middle" class="zone-label">🏢 Microsoft Entra ID</text>

  <rect x="330" y="325" width="240" height="55" class="box box-entra"/>
  <text x="450" y="350" text-anchor="middle" class="title" style="fill:#7b1fa2;">App Registration</text>
  <text x="450" y="366" text-anchor="middle" class="subtitle">Federated Credential (GitHub OIDC)</text>

  <!-- ============================================================ -->
  <!-- End User Zone (bottom) -->
  <!-- ============================================================ -->
  <rect x="310" y="440" width="280" height="80" class="zone"/>
  <text x="450" y="463" text-anchor="middle" class="zone-label">👤 エンドユーザー</text>
  <rect x="370" y="472" width="160" height="38" class="box" style="fill:#e8eaf6; stroke:#3949ab;"/>
  <text x="450" y="497" text-anchor="middle" class="title" style="fill:#3949ab;">🌐 ブラウザアクセス</text>

  <!-- ============================================================ -->
  <!-- Arrows: Developer → GitHub -->
  <!-- ============================================================ -->
  <!-- git push -->
  <path d="M245 125 L328 125" class="arrow arrow-dark" marker-end="url(#arrowhead)"/>
  <text x="286" y="118" text-anchor="middle" class="arrow-label">git push</text>

  <!-- ============================================================ -->
  <!-- Arrows: GitHub Actions → SWA -->
  <!-- ============================================================ -->
  <path d="M580 125 L668 155" class="arrow arrow-blue" marker-end="url(#arrowhead-blue)"/>
  <text x="618" y="126" text-anchor="middle" class="arrow-label" fill="#0078d4">デプロイ</text>

  <!-- GitHub OIDC → Entra ID -->
  <path d="M455 227 L455 323" class="arrow arrow-purple" marker-end="url(#arrowhead-purple)"/>
  <text x="445" y="275" text-anchor="end" class="arrow-label" fill="#7b1fa2">トークン検証</text>

  <!-- Entra ID → SWA (trust) -->
  <path d="M570 352 L668 260" class="arrow arrow-purple" marker-end="url(#arrowhead-purple)" stroke-dasharray="5,3"/>
  <text x="610" y="295" text-anchor="middle" class="arrow-label" fill="#7b1fa2">信頼関係</text>

  <!-- ============================================================ -->
  <!-- Arrows: Managed Identity → Key Vault -->
  <!-- ============================================================ -->
  <path d="M954 208 L954 223" class="arrow arrow-green" marker-end="url(#arrowhead-green)"/>
  <text x="990" y="218" text-anchor="start" class="arrow-label" fill="#2e7d32">MI でアクセス</text>

  <!-- App Settings → Key Vault -->
  <path d="M954 310 L954 297" class="arrow arrow-green" marker-end="url(#arrowhead-green)" stroke-dasharray="4,2"/>

  <!-- SWA → Built-in Auth -->
  <path d="M765 208 L765 223" class="arrow arrow-blue" marker-end="url(#arrowhead-blue)"/>

  <!-- SWA ↔ Managed Identity -->
  <path d="M860 163 L872 163" class="arrow arrow-blue" marker-end="url(#arrowhead-blue)"/>

  <!-- ============================================================ -->
  <!-- Arrows: End User → SWA -->
  <!-- ============================================================ -->
  <path d="M575 490 Q620 490 650 440 Q680 400 720 380" class="arrow arrow-blue" marker-end="url(#arrowhead-blue)" stroke-dasharray="4,3"/>
  <text x="640" y="450" text-anchor="middle" class="arrow-label" fill="#0078d4">HTTPS</text>

  <!-- ============================================================ -->
  <!-- Legend -->
  <!-- ============================================================ -->
  <rect x="30" y="540" width="1040" height="165" class="zone"/>
  <text x="50" y="565" class="zone-label">📋 凡例 / データフロー</text>

  <!-- Flow 1: CI/CD -->
  <rect x="50" y="580" width="12" height="12" fill="#24292f" rx="2"/>
  <text x="70" y="591" style="font-size:11px;fill:#212529;font-weight:600;">CI/CD フロー</text>
  <text x="70" y="605" style="font-size:10px;fill:#6c757d;">開発者が git push → GitHub Actions が起動 → OIDC トークン取得 → Entra ID で検証 → SWA へデプロイ</text>

  <!-- Flow 2: Security -->
  <rect x="50" y="620" width="12" height="12" fill="#2e7d32" rx="2"/>
  <text x="70" y="631" style="font-size:11px;fill:#212529;font-weight:600;">シークレット管理フロー</text>
  <text x="70" y="645" style="font-size:10px;fill:#6c757d;">SWA (Managed Identity) → Key Vault Secrets User ロールで Key Vault にアクセス → App Settings で参照</text>

  <!-- Flow 3: Auth -->
  <rect x="50" y="660" width="12" height="12" fill="#7b1fa2" rx="2"/>
  <text x="70" y="671" style="font-size:11px;fill:#212529;font-weight:600;">認証フロー</text>
  <text x="70" y="685" style="font-size:10px;fill:#6c757d;">エンドユーザー → SWA (/.auth/login/github) → GitHub OAuth → 認証済みセッション → staticwebapp.config.json でルート制御</text>

  <!-- Key points -->
  <rect x="570" y="620" width="12" height="12" fill="#0078d4" rx="2"/>
  <text x="590" y="631" style="font-size:11px;fill:#212529;font-weight:600;">セキュリティポイント</text>
  <text x="590" y="648" style="font-size:10px;fill:#6c757d;">• デプロイトークン不要 (OIDC Federated Credential)</text>
  <text x="590" y="662" style="font-size:10px;fill:#6c757d;">• シークレット直書き不要 (Key Vault + Managed Identity)</text>
  <text x="590" y="676" style="font-size:10px;fill:#6c757d;">• 自動 SSL 証明書管理 (Let's Encrypt)</text>
  <text x="590" y="690" style="font-size:10px;fill:#6c757d;">• IP フィルタリング / ロールベース認可 (staticwebapp.config.json)</text>
</svg>
